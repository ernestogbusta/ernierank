services:
  - type: web
    name: ernierank
    env: python
    plan: starter # Asegúrate de ajustar esto según el plan que estés utilizando
    buildCommand: pip3 install -r requirements.txt
    startCommand: gunicorn main:app -b :$PORT --worker-class gevent --workers 4 --timeout 31536000
    envVars:
      - key: FLASK_APP
        value: main.py
      - key: FLASK_ENV
        value: production
      - key: VIRTUAL_ENV
        value: /opt/render/project/src/.venv # Ajusta este valor si tu estructura de directorios es diferente
      - key: PORT
        fromService:
          type: web
          name: ernierank
          envVarKey: PORT
    healthCheckPath: /
