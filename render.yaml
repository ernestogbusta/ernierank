services:
  - name: web
    type: web_service
    env: python
    buildCommand: python3 -m pip install -r requirements.txt
    startCommand: gunicorn main:app -b :$PORT --timeout 5000 --workers 500 --threads 64
    plan: team
    healthCheckPath: /
    envVars:
      - key: PYTHONUNBUFFERED
        value: "true"
