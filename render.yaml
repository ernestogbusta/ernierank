services:
  - type: web
    name: ernierank-vd20
    env: python
    plan: team # Asegúrate de cambiar esto si cambias de plan
    buildCommand: pip3 install -r requirements.txt
    startCommand: gunicorn main:app -b :$PORT --worker-class gevent --workers 5 --worker-connections 1000 --timeout 30
    envVars:
      - key: FLASK_APP
        value: main.py
      - key: FLASK_ENV
        value: production
      - key: VIRTUAL_ENV
        value: /opt/render/project/src/.venv
      - key: PORT
        fromService:
          type: web
          name: ernierank-vd20
          envVarKey: PORT
    healthCheckPath: /
