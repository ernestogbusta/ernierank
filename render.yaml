services:
  - type: web
    name: ernierank-vd20
    env: python
    plan: starter
    buildCommand: pip3 install -r requirements.txt
    startCommand: gunicorn main:app -b :$PORT --worker-class gevent --workers 4 --timeout 180
    envVars:
      - key: FLASK_APP
        value: main.py  # Confirma que este es el nombre correcto de tu archivo Flask principal
      - key: FLASK_ENV
        value: production  # Asegúrate de que este es el entorno adecuado para tu despliegue
      - key: VIRTUAL_ENV
        value: /opt/render/project/src/.venv  # Ajusta este valor si tu entorno virtual está en una ruta diferente
      - key: PORT
        fromService:
          type: web
          name: ernierank-vd20
          envVarKey: PORT
    healthCheckPath: /
